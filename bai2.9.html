<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập 2.9</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        header {
            padding: 20px;
            text-align: center;
        }
        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo {
            width: 50px;
        }
        header h1 {
            color: #2b58a1;
            font-size: 30px;
            margin: 0;
        }
        nav {
            background-color: #4a76a8;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        nav ul li a {
            display: block;
            padding: 10px 15px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border-right: 1px solid #fff;
        }
        .main {
            display: flex;
            padding: 20px;
        }
        .form-area {
            flex: 2;
            padding-right: 20px;
        }
        .row {
            display: flex;
            margin-bottom: 10px;
            align-items: center;
        }
        .row label {
            width: 130px;
            font-size: 14px;
        }
        .row label span {
            color: red;
        }
        .row input, .row select, .row textarea {
            flex: 1;
            padding: 5px;
            border: 1px solid #ccc;
        }
        .btns {
            margin-left: 130px;
        }
        .btn-green {
            background-color: #2d8a2d;
            color: white;
            border: none;
            padding: 7px 12px;
            cursor: pointer;
        }
        .btn-blue {
            background-color: blue;
            color: white;
            border: none;
            padding: 7px 12px;
            cursor: pointer;
        }
        .sidebar {
            flex: 1;
            border-left: 1px dotted #ccc;
            padding-left: 20px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 8px;
        }
        .sidebar a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
        footer {
            text-align: center;
            padding: 15px;
            border-top: 1px solid #ccc;
            color: #2b58a1;
            font-size: 13px;
        }
    </style>
</head>
